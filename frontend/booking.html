<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Booking - Glow Residency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <span class="brand-text">GLOW</span>
                <span class="brand-sub">RESIDENCY</span>
            </a>
        </div>
    </nav>

    <!-- Booking Section -->
    <section class="py-5">
        <div class="container">
            <h2 class="mb-5 text-center">Complete Your Booking</h2>
            <div class="row">
                <!-- Booking Form -->
                <div class="col-md-8">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <form id="bookingForm">
                                <h5 class="mb-4">Guest Information</h5>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First Name</label>
                                        <input type="text" class="form-control" id="firstName" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" class="form-control" id="lastName" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Phone</label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>
                                <hr>
                                <h5 class="mb-4">Booking Details</h5>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Check-in</label>
                                        <input type="date" class="form-control" id="checkIn" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Check-out</label>
                                        <input type="date" class="form-control" id="checkOut" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Special Requests</label>
                                    <textarea class="form-control" id="specialRequests" rows="3"></textarea>
                                </div>
                                <button type="submit" class="btn btn-gold btn-lg w-100">PROCEED TO PAYMENT</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Booking Summary -->
                <div class="col-md-4">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-dark text-white p-4">
                            <h5 class="mb-0 gold">Booking Summary</h5>
                        </div>
                        <div class="card-body p-4">
                            <div id="summaryContent">
                                <!-- Summary will be loaded here -->
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong>Total:</strong>
                                <strong id="totalPrice" class="gold">$0</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Glow Residency. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
